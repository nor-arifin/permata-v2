services:
  nginx:
    image: nginx:stable-alpine
    container_name: permata-nginx
    ports:
      - "8980:80"
    volumes:
      - ./labklin:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - mysql
    networks:
      - app-network

  php:
    build:
      context: ./docker
    container_name: permata-php
    volumes:
      - ./labklin:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: permata-mysql
    ports:
      - "8933:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: glkueonq_labklinapp
      MYSQL_USER: glkueonq_apps
      MYSQL_PASSWORD: '@tbVxQhF0VRQe9Hm'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./glkueonq_labklinapp.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: permata-phpmyadmin
    ports:
      - "8981:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 100M
    depends_on:
      - mysql
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: permata-redis
    ports:
      - "8963:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

volumes:
  mysql_data:
  redis_data:

networks:
  app-network:
    driver: bridge
